<!DOCTYPE html>

<style>
:root {
  --blue-dark : #1a2e5a;
  --blue-mid  : #2c5282;
  --gold      : #c9a227;
  --red       : #c53030;
  --green     : #276749;
  --gray      : #718096;
  --border    : #e2e8f0;
  --bg        : #f0f4f8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',' ',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:48px}

/* Header */
.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));color:#fff;padding:20px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.btn-back{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;text-decoration:none}
.header-title{flex:1;text-align:center}
.header-title h1{font-size:1.05rem;font-weight:700}
.header-title p{font-size:.72rem;opacity:.8;margin-top:2px}

/* Card */
.card{background:#fff;border-radius:14px;margin:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden}
.card-head{background:var(--blue-dark);color:#fff;padding:12px 18px}
.card-head h2{font-size:.95rem;font-weight:700}
.card-body{padding:16px}

/* Section title */
.sec-title{font-size:.82rem;font-weight:700;color:var(--blue-dark);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}

/* Rule items */
.rule-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:.82rem;line-height:1.6;color:#2d3748}
.rule-item:last-child{border-bottom:none}
.rule-icon{font-size:1rem;flex-shrink:0;margin-top:1px}

/* Fee table */
.fee-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:4px}
.fee-table th{background:var(--blue-dark);color:#fff;padding:8px 10px;text-align:center;font-weight:700}
.fee-table td{padding:8px 10px;border:1px solid var(--border);text-align:center}
.fee-table tr:nth-child(even) td{background:#f7fafc}

/* Notice box */
.notice-box{background:#fffbeb;border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:11px 14px;margin:12px 0;font-size:.78rem;color:#744210;line-height:1.65}
.notice-box strong{display:block;margin-bottom:3px;font-weight:700}

/* Warning box */
.warn-box{background:#fff5f5;border-left:4px solid var(--red);border-radius:0 8px 8px 0;padding:11px 14px;margin:12px 0;font-size:.78rem;color:#742020;line-height:1.65}
.warn-box strong{display:block;margin-bottom:3px;font-weight:700}

/* Steps */
.steps{counter-reset:step;padding:4px 0}
.step{display:flex;gap:10px;padding:8px 0;font-size:.82rem;line-height:1.55;color:#2d3748;border-bottom:1px solid #f0f0f0}
.step:last-child{border-bottom:none}
.step-num{width:22px;height:22px;background:var(--blue-mid);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:1px}

/* Badge */
.badge{display:inline-block;background:var(--blue-dark);color:#fff;border-radius:4px;padding:1px 7px;font-size:.65rem;font-weight:700;margin-right:4px;vertical-align:middle}
.badge-red{background:var(--red)}
.badge-green{background:var(--green)}

.footer{text-align:center;color:var(--gray);font-size:.68rem;padding:8px 16px;line-height:1.8}
.updated{text-align:right;font-size:.68rem;color:var(--gray);padding:0 16px 4px}
</style>
</head>
